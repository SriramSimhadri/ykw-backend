openapi: 3.0.3
info:
  title: YKW Auth Service
  version: 1.0.0
  description: API contract for authentication and identity management in YKW platform

tags:
  - name: auth
    description: Authentication and identity operations

paths:
  /auth/register:
    post:
      tags:
        - auth
      summary: Register a new user
      operationId: registerUser
      parameters:
        - name: X-Trace-Id
          in: header
          required: true
          description: Unique trace identifier used for request tracing across services
          schema:
            type: string
            example: 7f9c2a3e-bb1a-4a77-8c33-2d9d8e9b5f1e
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegisterRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request
        '409':
          description: Email already exists

  /auth/login:
    post:
      tags:
        - auth
      summary: Authenticate a user and return JWT tokens
      operationId: loginUser
      parameters:
        - name: X-Trace-Id
          in: header
          required: true
          description: Unique trace identifier used for request tracing across services
          schema:
            type: string
            example: 7f9c2a3e-bb1a-4a77-8c33-2d9d8e9b5f1e
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials

  /auth/refresh:
    post:
      tags:
        - auth
      summary: Refresh JWT access token
      operationId: refreshToken
      parameters:
        - name: X-Trace-Id
          in: header
          required: true
          description: Unique trace identifier used for request tracing across services
          schema:
            type: string
            example: 7f9c2a3e-bb1a-4a77-8c33-2d9d8e9b5f1e
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid refresh token


components:
  schemas:

    UserRegisterRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: strongpassword123
        name:
          type: string
          example: John Doe

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password

    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Token expiration time in seconds
          example: 3600
        user:
          $ref: '#/components/schemas/UserResponse'

    UserResponse:
      type: object
      required:
        - id
        - email
        - name
        - role
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        name:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        status:
          $ref: '#/components/schemas/UserStatus'
        created_at:
          type: string
          format: date-time

    UserRole:
      type: string
      description: Role assigned to the user
      enum:
        - USER
        - ADMIN

    UserStatus:
      type: string
      description: Account status
      enum:
        - ACTIVE
        - DISABLED
        - SUSPENDED