openapi: 3.0.3

info:
  title: Profile Service API
  version: 1.0.0
  description: API for managing user profiles

tags:
  - name: UserProfile
    description: User Profile APIs
servers:
  - url: http://localhost:8091

paths:

  /api/users/me:
    get:
      tags:
        - UserProfile
      operationId: getCurrentProfile
      summary: Get current authenticated user's profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '404':
          description: Profile not found

    put:
      tags:
        - UserProfile
      operationId: updateCurrentProfile
      summary: Create or update current user's profile (upsert)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProfileRequest'
      responses:
        '200':
          description: Profile created or updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Invalid request

  /api/users/{userId}:
    get:
      tags:
        - UserProfile
      operationId: getProfile
      summary: Get user profile by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '404':
          description: User not found

  /api/users:
    get:
      tags:
        - UserProfile
      operationId: searchProfiles
      summary: Search users by name
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedUserResponse'

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    UserProfile:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          maxLength: 150
        bio:
          type: string
        profileImageUrl:
          type: string
        followersCount:
          type: integer
        followingCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UpdateUserProfileRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 150
        bio:
          type: string
        profileImageUrl:
          type: string

    PagedUserResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/UserProfile'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer