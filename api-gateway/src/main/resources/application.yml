server:
  port: 8081  # Gateway runs on 8081 (entry point for all client requests)

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379

  config:
    import:
      - classpath:config/routes.yml
      - classpath:config/security.yml
      - classpath:config/resilience.yml
      - classpath:config/logging.yml
      - classpath:config/management.yml